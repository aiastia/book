# 角色映射配置 ─ speaker(由 Director 分析产出)→ 语音参数
#
# ★ 重要: express-as style 由 scene_change(场景切换)自动决定,
#   角色的 style 仅作为兜底(场景未识别时使用),建议留空(null)。
#
# 字段说明:
#   rate/pitch: prosody 属性值,统一用百分比。
#               ★ 中文 TTS 建议范围: rate [-10%, +10%], pitch [-5%, +5%]。
#               超出范围会听起来不自然(太慢像卡壳,太快像机关枪)。
#   style:      仅在场景未识别时作为 express-as 兜底,建议 null。
#   emphasis:   强调级别(strong/moderate/none), 覆盖角色默认。
#               默认 none,只有特定角色(如战斗狂)才设为 strong。
#   volume:     prosody volume,如 soft/loud/x-loud/medium。

Narrator:                # 旁白(默认叙述者)
  rate: "-2%"
  pitch: "0%"
  style: null
  emphasis: "none"
  volume: null

Messenger:               # 信使/路人对话
  rate: "-8%"
  pitch: "-2%"
  style: null
  emphasis: "none"
  volume: null

KailanWeak:              # 凯兰 - 病弱态(第一卷)
  rate: "-10%"
  pitch: "-3%"
  style: null
  emphasis: "none"
  volume: null

KailanCalm:              # 凯兰 - 冷静/伪装态
  rate: "-5%"
  pitch: "-1%"
  style: null
  emphasis: "none"
  volume: null

Servant:                 # 仆人/老仆
  rate: "-5%"
  pitch: "-2%"
  style: "gentle"
  emphasis: "none"
  volume: null

default:                 # 未识别的 speaker 兜底
  rate: "0%"
  pitch: "0%"
  style: null
  emphasis: "none"
  volume: null
