# 场景预设 ─ 场景名(Director 的 scene_change 产出)→ 语音参数 + 默认停顿
#
# ★ express-as style 由 scene_change 自动映射(见 builder._SCENE_STYLE_MAP):
#   calm→calm, night→calm, suspense→serious, battle→angry,
#   chase→serious, sad→sad, comedy→cheerful
#   不需要在这里配置 style。
#
# 角色的 rate/pitch 和场景的 rate/pitch 会叠加(Builder 负责相加),
# 叠加后 clamp 到 [-15%, +15%] 防止中文 TTS 不自然。
# pause 是该场景下句子之间的默认停顿(当 DirectorLine 没指定 pause_after 时使用)。

calm:
  rate: "-2%"
  pitch: "0%"
  pause: "600ms"

night:
  rate: "-3%"
  pitch: "0%"
  pause: "600ms"

suspense:
  rate: "-3%"
  pitch: "0%"
  pause: "700ms"

battle:
  rate: "+5%"
  pitch: "+2%"
  pause: "150ms"

chase:
  rate: "+8%"
  pitch: "+2%"
  pause: "120ms"

sad:
  rate: "-5%"
  pitch: "-2%"
  pause: "800ms"

comedy:
  rate: "+3%"
  pitch: "+3%"
  pause: "400ms"

default:
  rate: "0%"
  pitch: "0%"
  pause: "500ms"
