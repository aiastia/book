# 场景预设 ─ 场景名(Director 的 scene_change 产出)→ 语音参数 + 默认停顿
#
# 场景会持续生效:遇到一个 scene_change 后,后续所有句子叠加该场景的参数,
# 直到下一个 scene_change 出现。
#
# 角色的 rate/pitch 和场景的 rate/pitch 会叠加(Builder 负责相加)。
# pause 是该场景下句子之间的默认停顿(当 DirectorLine 没指定 pause_after 时使用)。

calm:                    # 安静/日常
  rate: "-2%"
  pitch: "0%"
  pause: "600ms"

night:                   # 夜晚/沉寂
  rate: "-5%"
  pitch: "0%"
  pause: "600ms"

suspense:                # 悬念/紧张
  rate: "-3%"
  pitch: "0%"
  pause: "700ms"

battle:                  # 战斗/激烈
  rate: "+8%"
  pitch: "0%"
  pause: "150ms"

chase:                   # 追逐/急促
  rate: "+10%"
  pitch: "+3%"
  pause: "120ms"

sad:                     # 悲伤/沉重
  rate: "-10%"
  pitch: "-3%"
  pause: "800ms"

comedy:                  # 轻松/喜剧
  rate: "+5%"
  pitch: "+5%"
  pause: "400ms"

default:                 # 兜底
  rate: "0%"
  pitch: "0%"
  pause: "500ms"
