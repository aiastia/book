# 墨语 AI 小说创作平台 - Docker Compose
# 用法：
#   cp .env.example .env  &&  编辑 .env 填入 AI_API_KEY
#   docker compose up -d --build    # 构建并启动
#   docker compose logs -f          # 查看日志
#   docker compose down             # 停止
# 访问：
#   前端 http://localhost:3000
#   后端 http://localhost:8000/docs

services:
  backend:
    build: ./backend
    container_name: moyu-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data          # SQLite + ChromaDB 数据持久化
      - embedding-cache:/root/.cache/fastembed  # Embedding 模型缓存持久化
    env_file: .env
    environment:
      - MOYU_DATABASE_URL=sqlite+aiosqlite:///app/data/moyu.db
      - MOYU_DATA_DIR=/app/data
      - EMBEDDING_CACHE_DIR=/root/.cache/fastembed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  embedding-cache:  # Embedding 模型缓存（bge-small-zh-v1.5 ~100MB）

  frontend:
    build:
      context: ./frontend
      args:
        - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
    container_name: moyu-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
      - NUXT_API_BASE=http://backend:8000    # Docker 内部网络
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
