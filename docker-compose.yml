# 墨语 AI 小说创作平台 - Docker Compose
# 用法（使用预构建镜像）：
#   cp .env.example .env  &&  编辑 .env 填入 AI_API_KEY
#   docker compose up -d
# 用法（本地构建）：
#   docker compose up -d --build
# 访问：
#   前端 http://localhost:3000
#   后端 http://localhost:8000/docs

services:
  backend:
    image: ghcr.io/aiastia/book/backend:main
    # 如需本地构建，注释掉 image，取消下面 build 注释
    # build: ./backend
    container_name: moyu-backend
    ports:
      # 绑定到 127.0.0.1：公网不可达，仅宿主机上的 nginx 可通过 127.0.0.1:8000 转发
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/data:/app/data              # SQLite + ChromaDB 数据持久化
      - moyu-embedding:/root/.cache/fastembed  # Embedding 模型缓存（首次下载后持久化）
    env_file: .env
    environment:
      # 四个斜杠 = 绝对路径 /app/data/moyu.db（修复 unable to open database file）
      - MOYU_DATABASE_URL=sqlite+aiosqlite:////app/data/moyu.db
      - MOYU_DATA_DIR=/app/data
      - EMBEDDING_CACHE_DIR=/root/.cache/fastembed
    restart: unless-stopped

  frontend:
    image: ghcr.io/aiastia/book/frontend:main
    # build: ./frontend
    container_name: moyu-frontend
    ports:
      # 绑定到 127.0.0.1：公网不可达，仅宿主机上的 nginx 可通过 127.0.0.1:3000 转发
      - "127.0.0.1:3000:3000"
    environment:
      # 浏览器侧 API 地址：设为空 = 同源相对路径。
      # 浏览器请求 /api/login 时自动用当前页面 origin（nginx 域名），
      # 再由 nginx 把 /api 转发到后端 127.0.0.1:8000。
      # 好处：换域名 / 上 HTTPS 都不用重建前端容器。
      # ⚠️ 必须显式设为空，不能省略——nuxt.config.ts 默认值是 localhost:8000，
      #    省略会用默认值导致服务器上请求失败。
      - NUXT_PUBLIC_API_BASE=
      # 服务端 SSR 用：容器间内网通过容器名访问后端
      - NUXT_API_BASE=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  moyu-embedding:  # Embedding 模型缓存（首次启动自动下载，之后持久化）
